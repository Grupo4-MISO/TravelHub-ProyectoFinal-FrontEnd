version: 0.2

env:
  variables:
    S3_BUCKET: frontend-grupo-4
    CLOUDFRONT_DISTRIBUTION_ID: ESCOR63MVWODB

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Instalando dependencias..."
      - npm install -g @angular/cli
      - npm ci

  pre_build:
    commands:
      - echo "Ejecutando tests..."
      - ng test --watch=false --browsers=ChromeHeadless

  build:
    commands:
      - echo "Construyendo la aplicación Angular..."
      - ng build --configuration production

  post_build:
    commands:
      - echo "Desplegando en S3..."

      - aws s3 sync dist/travelhub/browser/ s3://$S3_BUCKET --delete --exclude "index.html" --cache-control "public, max-age=31536000, immutable"

      - aws s3 cp dist/travelhub/browser/index.html s3://$S3_BUCKET/index.html --cache-control "no-cache, no-store, must-revalidate"

      - echo "Invalidando caché de CloudFront..."

      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"

cache:
  paths:
    - node_modules/**/*