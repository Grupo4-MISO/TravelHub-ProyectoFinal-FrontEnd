<section [formGroup]="group()" class="section-card" aria-labelledby="traveler-address-title">
  <h2 id="traveler-address-title">Direccion</h2>

  <label for="address-line1">Linea 1</label>
  <input id="address-line1" type="text" formControlName="line1" autocomplete="address-line1" />

  <label for="address-line2">Linea 2</label>
  <input id="address-line2" type="text" formControlName="line2" autocomplete="address-line2" />

  <div class="grid-two">
    <div class="field">
      <label for="address-city">Ciudad</label>
      <input id="address-city" type="text" formControlName="city" autocomplete="address-level2" />
    </div>

    <div class="field">
      <label for="address-state">Estado</label>
      <input id="address-state" type="text" formControlName="state" autocomplete="address-level1" />
    </div>
  </div>

  <div class="grid-three">
    <div class="field">
      <label for="address-country">Pais</label>
      <input id="address-country" type="text" formControlName="country" autocomplete="country-name" />
    </div>

    <div class="field">
      <label for="address-country-code">Codigo pais</label>
      <input id="address-country-code" type="text" formControlName="countryCode" autocomplete="country" />
    </div>

    <div class="field">
      <label for="address-postal">Codigo postal</label>
      <input id="address-postal" type="text" formControlName="postal_code" autocomplete="postal-code" />
    </div>
  </div>
</section>
