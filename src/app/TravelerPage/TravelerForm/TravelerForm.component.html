<section class="traveler-page" aria-labelledby="traveler-form-title">
  <header class="page-header">
    <h1 i18n id="traveler-form-title">Soy Viajero</h1>
    <p i18n>Registrate como cliente y comienza a disfrutar de nuestros servicios.</p>
  </header>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <app-traveler-data [group]="travelerGroup"></app-traveler-data>
    <app-address-form
      [group]="addressGroup"
      [states]="stateOptions()"
      [cities]="cityOptions()"
      [isLoadingStates]="isLoadingStates()"
      [isLoadingCities]="isLoadingCities()"
      [statesError]="statesError()"
      [citiesError]="citiesError()"></app-address-form>

    @if (submitError()) {
      <p data-cy="submit-error" class="feedback error" role="alert">{{ submitError() }}</p>
    }

    @if (submitSuccess()) {
      <p class="feedback success" role="status">{{ submitSuccess() }}</p>
    }

    <div class="actions">
      <button data-cy="create-account-button" type="submit" [disabled]="isSubmitting()">

          @if (isSubmitting()) { <span i18n="traveler|saving">Guardando...</span> }
          @if (!isSubmitting()) { <span i18n="traveler|create">Crear mi cuenta</span> }
        
      </button>
    </div>
  </form>
</section>
