<section class="provider-page" aria-labelledby="provider-form-title">
  <header class="page-header">
    <h1 i18n id="provider-form-title">Soy Proveedor</h1>
    <p i18n>Registrate como proveedor de servicios y empieza a recibir reservas.</p>
  </header>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <app-provider-company [group]="companyGroup"></app-provider-company>
    <app-provider-manager [group]="managerGroup"></app-provider-manager>
    <app-address-form
      [group]="addressGroup"
      [states]="stateOptions()"
      [cities]="cityOptions()"
      [isLoadingStates]="isLoadingStates()"
      [isLoadingCities]="isLoadingCities()"
      [statesError]="statesError()"
      [citiesError]="citiesError()"></app-address-form>

    @if (submitError()) {
      <p class="feedback error" role="alert">{{ submitError() }}</p>
    }

    @if (submitSuccess()) {
      <p class="feedback success" role="status">{{ submitSuccess() }}</p>
    }

    <div class="actions">
      <button data-cy="create-account-button" type="submit" [disabled]="isSubmitting()">

          @if (isSubmitting()) { <span i18n="provider|saving">Guardando...</span> }
          @if (!isSubmitting()) { <span i18n="provider|create">Crear mi cuenta</span> }
        
      </button>
    </div>
  </form>
</section>
