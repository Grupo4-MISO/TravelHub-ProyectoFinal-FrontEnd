<section [formGroup]="group()" class="section-card" aria-labelledby="provider-company-title">
  <h2 id="provider-company-title">Datos de la empresa</h2>

  <label for="provider-name">Nombre completo</label>
  <input
    id="provider-name"
    type="text"
    formControlName="name"
    autocomplete="organization"
    placeholder="Ej: Hoteles Andinos SAS" />

  <label for="provider-document">Numero de documento</label>
  <input
    id="provider-document"
    type="text"
    formControlName="DocumentNumber"
    autocomplete="off"
    placeholder="NIT, CUIT, RFC, RUC o documento" />
</section>
