<section [formGroup]="group()" class="section-card" aria-labelledby="provider-manager-title">
  <h2 id="provider-manager-title">Datos del administrador</h2>

  <div class="grid-two">
    <div class="field">
      <label for="manager-first-name">Nombre</label>
      <input id="manager-first-name" type="text" formControlName="first_name" autocomplete="given-name" />
    </div>

    <div class="field">
      <label for="manager-last-name">Apellido</label>
      <input id="manager-last-name" type="text" formControlName="last_name" autocomplete="family-name" />
    </div>
  </div>

  <label for="manager-email">Correo</label>
  <input id="manager-email" type="email" formControlName="email" autocomplete="email" />
  @if (group().controls['email'].touched && group().controls['email'].invalid) {
    <p class="field-feedback" role="alert">Ingresa un correo valido (ejemplo@dominio.com).</p>
  }

  <div class="grid-two">
    <div class="field">
      <label for="manager-password">Contrasena</label>
      <input id="manager-password" type="password" formControlName="password" autocomplete="new-password" />
      @if (group().controls['password'].touched && group().controls['password'].invalid) {
        <p class="field-feedback" role="alert">La contrasena debe tener al menos 8 caracteres.</p>
      }
    </div>

    <div class="field">
      <label for="manager-phone">Telefono</label>
      <input id="manager-phone" type="tel" formControlName="phone" autocomplete="tel" />
    </div>
  </div>
</section>
