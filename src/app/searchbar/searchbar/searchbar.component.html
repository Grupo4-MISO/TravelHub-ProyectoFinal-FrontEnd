<div class="search-container">
  <form [formGroup]="searchForm" (ngSubmit)="buscar()" class="search-bar">

  <!-- Ciudad -->
  <div class="field autocomplete">
    <label i18n for="search-ciudad">Destino</label>

    <input 
      id="search-ciudad"
      type="text" 
      formControlName="ciudad"
      (focus)="mostrarTodas()"
      autocomplete="off"
      placeholder="Ciudad destino" i18n-placeholder
      [class.invalid]="searchForm.get('ciudad')?.invalid && searchForm.get('ciudad')?.touched">

    <ul *ngIf="ciudadesFiltradas.length > 0" class="dropdown">
      <li *ngFor="let ciudad of ciudadesFiltradas"
          (click)="seleccionarCiudad(ciudad)"
          class="dropdown-item">

        <div class="item-content">
          
          <!-- Icono -->
          <img src="/iconos/location.svg" class="dropdown-icon" alt="" role="presentation">

          <!-- Texto -->
          <div class="text">
            <div class="city">{{ ciudad }}</div>
          </div>

        </div>

      </li>
    </ul>

    <!-- Error -->
    <small *ngIf="searchForm.get('ciudad')?.touched && searchForm.get('ciudad')?.hasError('required')" i18n>
      La ciudad es obligatoria
    </small>
  </div>

  <!-- Check-in -->
  <div class="field">
    <label i18n for="search-checkin">Check-In</label>
    <input
      id="search-checkin"
      data-cy="check-in"
      type="date" 
      formControlName="check_in"
      [class.invalid]="searchForm.get('check_in')?.invalid && searchForm.get('check_in')?.touched">

    <small *ngIf="searchForm.get('check_in')?.touched && searchForm.get('check_in')?.hasError('required')" i18n>
      La fecha de entrada es obligatoria
    </small>
  </div>

  <!-- Check-out -->
  <div class="field">
    <label i18n for="search-checkout">Check-Out</label>
    <input
      id="search-checkout"
      data-cy="check-out" 
      type="date" 
      formControlName="check_out"
      [class.invalid]="searchForm.get('check_out')?.invalid && searchForm.get('check_out')?.touched">

    <small *ngIf="searchForm.get('check_out')?.touched && searchForm.get('check_out')?.hasError('required')" i18n>
      La fecha de salida es obligatoria
    </small>
  </div>

  <!-- Huéspedes -->
  <div class="field">
    <label i18n for="search-huespedes">Huéspedes</label>
    <input 
      id="search-huespedes"
      data-cy="guests"
      type="number" 
      formControlName="capacidad"
      min="1"
      [class.invalid]="searchForm.get('capacidad')?.invalid && searchForm.get('capacidad')?.touched">

    <!-- requerido -->
    <small *ngIf="searchForm.get('capacidad')?.touched && searchForm.get('capacidad')?.hasError('required')" i18n>
      La cantidad de huéspedes es obligatoria
    </small>

    <!-- mínimo -->
    <small *ngIf="searchForm.get('capacidad')?.touched && searchForm.get('capacidad')?.hasError('min')" i18n>
      Debe haber al menos 1 huésped
    </small>
  </div>

  <!-- Error de fechas -->
  <div class="error-fechas" *ngIf="searchForm.hasError('fechasInvalidas')" i18n>
    La fecha de salida debe ser posterior al check-in
  </div>

  <!-- Botón -->
  <button
    data-cy="search" 
    type="submit" 
    class="search-btn"
    [disabled]="searchForm.invalid || loading">

    <span *ngIf="loading" i18n>Buscando...</span>
    <span *ngIf="!loading" i18n>Buscar</span>
  </button>
  </form>
</div>
