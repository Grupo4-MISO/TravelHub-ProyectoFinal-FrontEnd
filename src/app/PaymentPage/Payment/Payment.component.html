<main class="payment-page">
  @if (!holdReservationErrorMessage()) {
  <div class="payment-content">
    <app-payment-reservation-summary [reservationRows]="reservationRows()"></app-payment-reservation-summary>
    <app-payment-rate
      [checkIn]="reservationData()?.checkIn ?? ''"
      [checkOut]="reservationData()?.checkOut ?? ''"
      [precio]="precioNumerico()"
      [descuento]="0.10"
      [pais]="reservationData()?.pais ?? 'CO'"
    ></app-payment-rate>
  </div>
  <app-payment-method (confirmReservation)="submitHoldReservation()"></app-payment-method>
  } @else {
  <section class="availability-error" aria-live="assertive" role="alert">
    <h2 class="availability-error-title">Pago no disponible</h2>
    <p class="availability-error-message">{{ holdReservationErrorMessage() }}</p>
  </section>
  }
</main>
