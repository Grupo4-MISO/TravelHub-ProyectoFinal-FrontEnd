<main class="login-page container-fluid">
  <div class="row h-100">
    <section class="img-container w-50">
      <img
        src="https://res.cloudinary.com/drpipdmgz/image/upload/v1775407179/img_login_msfzh6.png"
        i18n-alt="login|Imagen publicitaria" alt="Imagen publicitaria TravelHub"
        style="object-fit: cover;"
      />
    </section>
    <section class="login-card" aria-labelledby="login-title">
      <img src="/Logo.svg" alt="Logo" class="logo" routerLink="/">
      <h1 i18n id="login-title" class="visually-hidden">Inicia sesion para continuar</h1>
      @if (error) {
      <p class="login-error" role="alert" aria-live="polite">{{ error }}</p>
      }
      <form class="login-form" (submit)="Authlogin(email.value, password.value); $event.preventDefault()">
        <div class="form-group">
          <label i18n for="email">Email</label>
          <input
            data-cy="email-input"
            #email
            id="email"
            name="email"
            type="email"
            i18n-placeholder="login|Email placeholder" placeholder="micorreo@email.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label i18n for="password">Password</label>
          <input
            data-cy="password-input"
            #password
            id="password"
            name="password"
            type="password"
            i18n-placeholder="login|Password placeholder" placeholder="Mi clave"
            autocomplete="current-password"
            required
          />
        </div>

        <button 
        type="submit" 
        data-cy="login-submit-button"
        i18n class="login-button">Iniciar sesion</button>
      </form>
    </section>
  </div>
</main>
