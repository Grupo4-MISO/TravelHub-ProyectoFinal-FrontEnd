<section class="availability-section">
  <h2>Disponibilidad seleccionada</h2>

  <div class="availability-grid">
    <article class="availability-item">
      <p class="label">Check-In</p>
      <p class="value">{{ formatDate(check_in) }}</p>
    </article>

    <article class="availability-item">
      <p class="label">Check-Out</p>
      <p class="value">{{ formatDate(check_out) }}</p>
    </article>

    <article class="availability-item">
      <p class="label">Capacidad</p>
      <p class="value">{{ capacidad ?? 'No definida' }} persona(s)</p>
    </article>
  </div>
</section>
