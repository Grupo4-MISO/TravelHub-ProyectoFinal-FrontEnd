<section class="rooms-section">
  <h2>Habitaciones disponibles</h2>

  <div class="rooms-grid" *ngIf="rooms.length > 0; else noRooms">
    <article class="room-card" *ngFor="let room of rooms">
      <img class="room-image" [src]="room.imageUrl" [alt]="room.descripcion" />
      <div class="room-content">
        <h3>{{ room.descripcion }}</h3>
        <p>Código: {{ room.code }}</p>
        <p>Capacidad: {{ room.capacidad }} persona(s)</p>
        <p class="price">${{ room.precio }} {{localCurrency}} / noche</p>
        <button class="btn-primary" data-cy="reservar-habitacion" (click)="reservar(room)">Reservar ahora</button>
      </div>
    </article>
  </div>

  <ng-template #noRooms>
    <div class="state-message">No hay habitaciones disponibles para este hospedaje.</div>
  </ng-template>
</section>
